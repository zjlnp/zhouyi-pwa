<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="金钱卦">
<meta name="theme-color" content="#c44536">
<meta name="description" content="按曾仕强金钱卦方法，周易六十四卦占筮">
<script>
// 私域访问控制 — 仅允许列表中的域名
(function(){
  var allow = ['localhost','127.0.0.1','zjlnp.github.io'];
  if (allow.indexOf(location.hostname) === -1) {
    document.documentElement.style.display = 'none';
    document.addEventListener('DOMContentLoaded', function(){
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100dvh;font-family:sans-serif;color:#999">访问受限</div>';
    });
  }
})();
</script>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192b.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512b.png">
<link rel="icon" type="image/svg+xml" href="icons/icon-v2.svg">
<title>金钱卦 · 周易占筮</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

<div class="top-bar">
  <h1 class="title"><svg class="taiji-icon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#faf9f6"/><path d="M50 2A48 48 0 0 1 50 98A24 24 0 0 0 50 50A24 24 0 0 1 50 2Z" fill="#2d2a26"/><circle cx="50" cy="26" r="24" fill="#2d2a26"/><circle cx="50" cy="74" r="24" fill="#faf9f6"/><circle cx="50" cy="26" r="5" fill="#faf9f6"/><circle cx="50" cy="74" r="5" fill="#2d2a26"/></svg> 金钱卦 · 周易占筮</h1>
  <div class="top-right">
    <input type="text" id="search-input" class="search-input" placeholder="搜卦名/序号..." autocomplete="off" enterkeyhint="search">
    <div id="search-results" class="search-results" style="display:none"></div>
    <button id="history-toggle" class="history-toggle">&#x1F4CB; 历史</button>
  </div>
</div>

<!-- Input area -->
<div class="input-area" id="input-area">
  <div class="input-hint-top">按 曾仕强 金钱卦方法，输入每次三枚铜钱的合计值</div>
  <div class="input-row-wrap">
    <input type="text" id="yao1" class="yao-num" maxlength="1" pattern="[6-9]" placeholder="初" inputmode="numeric" autofocus>
    <input type="text" id="yao2" class="yao-num" maxlength="1" pattern="[6-9]" placeholder="二" inputmode="numeric">
    <input type="text" id="yao3" class="yao-num" maxlength="1" pattern="[6-9]" placeholder="三" inputmode="numeric">
    <input type="text" id="yao4" class="yao-num" maxlength="1" pattern="[6-9]" placeholder="四" inputmode="numeric">
    <input type="text" id="yao5" class="yao-num" maxlength="1" pattern="[6-9]" placeholder="五" inputmode="numeric">
    <input type="text" id="yao6" class="yao-num" maxlength="1" pattern="[6-9]" placeholder="上" inputmode="numeric">
  </div>
  <div class="input-legend">6 = 老阴 ⚋× ｜ 7 = 少阳 ⚊ ｜ 8 = 少阴 ⚋ ｜ 9 = 老阳 ⚊○</div>
  <!-- 之卦直查 -->
  <div class="zhi-gua-row" id="zhi-gua-row">
    <input type="text" id="zhi-ben" class="zhi-gua-input" placeholder="本卦" autocomplete="off" enterkeyhint="done">
    <span class="zhi-gua-zhi">之</span>
    <input type="text" id="zhi-bian" class="zhi-gua-input" placeholder="之卦" autocomplete="off" enterkeyhint="done">
  </div>

  <div class="input-btns">
    <button id="divinate-btn" class="divinate-btn"><svg class="taiji-icon-sm" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#faf9f6"/><path d="M50 2A48 48 0 0 1 50 98A24 24 0 0 0 50 50A24 24 0 0 1 50 2Z" fill="#2d2a26"/><circle cx="50" cy="26" r="24" fill="#2d2a26"/><circle cx="50" cy="74" r="24" fill="#faf9f6"/><circle cx="50" cy="26" r="5" fill="#faf9f6"/><circle cx="50" cy="74" r="5" fill="#2d2a26"/></svg> 起卦</button>
    <button id="clear-btn" class="clear-btn">✕ 清除</button>
  </div>
</div>

<!-- Results -->
<div class="results" id="results" style="display:none">
  <div class="dual-gua" id="dual-gua">
    <!-- Ben Gua -->
    <div class="gua-card ben-gua" id="ben-card">
      <div class="gua-label">本卦</div>
      <div class="gua-header">
        <span class="gua-unicode" id="ben-unicode"></span>
        <div class="gua-header-text">
          <span class="gua-name" id="ben-name"></span>
          <span class="gua-number" id="ben-number"></span>
          <span class="gua-shiyi" id="ben-shiyi"></span>
        </div>
      </div>
      <div class="classics-area" id="ben-classics">
        <div class="guaci-toggle" id="ben-guaci-toggle" style="display:none">
          <div class="guaci-toggle-btn">📜 卦辞 ▾</div>
          <div class="guaci-toggle-body" id="ben-guaci-body"></div>
        </div>
        <div class="tuan-toggle" id="ben-tuan-toggle" style="display:none">
          <div class="tuan-toggle-btn">📖 彖传 ▾</div>
          <div class="tuan-toggle-body" id="ben-tuan-body"></div>
        </div>
        <div class="daxiang-toggle" id="ben-daxiang-toggle" style="display:none">
          <div class="daxiang-toggle-btn">🏔 大象传 ▾</div>
          <div class="daxiang-toggle-body" id="ben-daxiang-body"></div>
        </div>
      </div>
      <div class="gua-visual" id="ben-lines"></div>
    </div>

    <!-- Middle -->
    <div class="middle-col" id="middle-col">
      <div class="gua-arrow" id="gua-arrow"><span>→</span></div>
      <div class="bian-title" id="bian-title"></div>
      <div class="ref-box" id="ref-box"></div>
    </div>

    <!-- Bian Gua -->
    <div class="gua-card bian-gua" id="bian-card">
      <div class="gua-label">之卦</div>
      <div class="gua-header">
        <span class="gua-unicode" id="bian-unicode"></span>
        <div class="gua-header-text">
          <span class="gua-name" id="bian-name"></span>
          <span class="gua-number" id="bian-number"></span>
          <span class="gua-shiyi" id="bian-shiyi"></span>
        </div>
      </div>
      <div class="classics-area" id="bian-classics">
        <div class="guaci-toggle" id="bian-guaci-toggle" style="display:none">
          <div class="guaci-toggle-btn">📜 卦辞 ▾</div>
          <div class="guaci-toggle-body" id="bian-guaci-body"></div>
        </div>
        <div class="tuan-toggle" id="bian-tuan-toggle" style="display:none">
          <div class="tuan-toggle-btn">📖 彖传 ▾</div>
          <div class="tuan-toggle-body" id="bian-tuan-body"></div>
        </div>
        <div class="daxiang-toggle" id="bian-daxiang-toggle" style="display:none">
          <div class="daxiang-toggle-btn">🏔 大象传 ▾</div>
          <div class="daxiang-toggle-body" id="bian-daxiang-body"></div>
        </div>
      </div>
      <div class="gua-visual" id="bian-lines"></div>
    </div>
  </div>
</div>

<!-- History -->
<div class="history-panel" id="history-panel" style="display:none">
  <div class="history-header">
    <h2>📋 占卜历史</h2>
    <div class="history-header-btns">
      <button id="clear-cache-btn" class="history-clear-top" style="color:var(--text-secondary);">🧹 缓存</button>
      <button id="history-close" class="history-close">✕</button>
    </div>
  </div>
  <div class="history-list" id="history-list"></div>
  <div class="history-empty" id="history-empty">暂无记录</div>
  <button id="history-clear-all" class="history-clear-all">清空全部记录</button>
</div>

<!-- Notes modal -->
<div class="modal-overlay" id="notes-modal" style="display:none">
  <div class="modal-box">
    <h3>添加备注</h3>
    <textarea id="notes-textarea" rows="3" placeholder="输入备注..."></textarea>
    <div class="modal-btns">
      <button id="notes-save" class="modal-btn-save">保存</button>
      <button id="notes-cancel" class="modal-btn-cancel">取消</button>
    </div>
  </div>
</div>

</div>

<div class="copy-float" id="copy-float" style="display:none">复制</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
// 注册 Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      console.log('SW registered:', reg.scope);
    }).catch(function(err) {
      console.warn('SW registration failed:', err);
    });
  });
}
</script>
</body>
</html>
